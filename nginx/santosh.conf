# Santosh Palace — Nginx Configuration
# Symlink this to /etc/nginx/sites-enabled/santosh
#   sudo cp /var/www/santosh-palace/nginx/santosh.conf /etc/nginx/sites-available/santosh
#   sudo ln -s /etc/nginx/sites-available/santosh /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name santosh.snapkhata.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name santosh.snapkhata.com;

    # ── TLS ──────────────────────────────────────────────────────────────
    # Option A: reuse existing snapkhata.com wildcard cert (if wildcard covers *.snapkhata.com)
    ssl_certificate     /etc/letsencrypt/live/snapkhata.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snapkhata.com/privkey.pem;
    # Option B: issue a dedicated cert — uncomment and comment out Option A:
    # ssl_certificate     /etc/letsencrypt/live/santosh.snapkhata.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/santosh.snapkhata.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            DENY                                  always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # ── Static React/Vite Build ───────────────────────────────────────────
    root  /var/www/santosh-palace/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite adds content-hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── FastAPI — proxy /api/ to port 8001 ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allows ID photo uploads (max 10 MB per the plan)
        client_max_body_size 10M;

        # FastAPI OpenAPI docs — accessible only from localhost in production
        # Remove this block to allow public API docs access
        location /api/docs {
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://127.0.0.1:8001/docs;
        }
    }

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/santosh-access.log;
    error_log  /var/log/nginx/santosh-error.log;
}
