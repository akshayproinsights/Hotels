# Santosh Palace — Nginx Configuration
# Symlink this to /etc/nginx/sites-enabled/santosh
#   sudo ln -s /root/Hotel_Santosh/nginx/santosh.conf /etc/nginx/sites-enabled/santosh
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect all HTTP → HTTPS
server {
    if ($host = santosh.snapkhata.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name santosh.snapkhata.com;
    return 301 https://$host$request_uri;


}

server {
    listen 443 ssl http2;
    server_name santosh.snapkhata.com;

    # ── TLS ──────────────────────────────────────────────────────────────
    # Dedicated cert for santosh.snapkhata.com (temporarily using snapkhata.com to pass config checks)
    ssl_certificate /etc/letsencrypt/live/santosh.snapkhata.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/santosh.snapkhata.com/privkey.pem; # managed by Certbot

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            DENY                                  always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # ── Static React/Vite Build ───────────────────────────────────────────
    root  /root/Hotel_Santosh/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── NEVER cache index.html or service worker files ────────────────────
    # These must always be fresh so browsers pick up new JS bundle filenames
    location ~* (index\.html|registerSW\.js|sw\.js|manifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # Cache static assets aggressively (Vite adds content-hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── FastAPI — proxy /api/ to port 8002 ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allows ID photo uploads (max 10 MB per the plan)
        client_max_body_size 10M;

        # FastAPI OpenAPI docs — accessible only from localhost in production
        # Remove this block to allow public API docs access
        location /api/docs {
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://127.0.0.1:8002/docs;
        }
    }

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/santosh-access.log;
    error_log  /var/log/nginx/santosh-error.log;

}
